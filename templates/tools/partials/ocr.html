{% load static %}
{{ labels|json_script:"tool-labels" }}
<div class="mx-auto max-w-4xl space-y-6" x-data="window.toolFactory('ocr')">
<div class="rounded-xl border border-border bg-card p-6 shadow-sm space-y-4"><input type="file" accept="image/*" @change="onFile($event)" /><p class="text-sm" x-show="busy">Recognizing…</p><p class="text-sm text-destructive" x-show="err" x-text="err"></p><textarea class="min-h-[200px] w-full rounded border p-3 text-sm" x-model="text" readonly></textarea><button type="button" class="text-sm underline" @click="copy()">Copy</button></div>
</div>
