{% load static %}
{{ labels|json_script:"tool-labels" }}
<div class="mx-auto max-w-4xl space-y-6" x-data="window.toolFactory('statistics-summary')">
<div class="rounded-xl border border-border bg-card p-6 shadow-sm space-y-4"><textarea class="min-h-[120px] w-full rounded-lg border p-3 font-mono text-sm" x-model="input" placeholder="1, 2, 3..."></textarea><button type="button" class="rounded-lg bg-foreground px-4 py-2 text-sm text-background" @click="run()">Summarize</button><div class="grid grid-cols-2 gap-2 text-sm md:grid-cols-4" x-show="count"><div>Count: <span x-text="count"></span></div><div>Sum: <span x-text="sum"></span></div><div>Mean: <span x-text="mean"></span></div><div>Min/Max: <span x-text="min"></span> / <span x-text="max"></span></div></div></div>
</div>
