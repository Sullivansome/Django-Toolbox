{% load static %}
{{ labels|json_script:"tool-labels" }}
<div class="mx-auto max-w-4xl space-y-6" x-data="window.toolFactory('password-generator')">
<div class="rounded-xl border border-border bg-card p-6 shadow-sm space-y-4"><div class="grid gap-3 md:grid-cols-2"><label class="text-sm">Length <input type="number" min="4" max="128" class="ml-2 w-20 rounded border px-2 py-1" x-model.number="len" /></label></div><div class="flex flex-wrap gap-4 text-sm"><label><input type="checkbox" x-model="useUpper" /> A-Z</label><label><input type="checkbox" x-model="useLower" /> a-z</label><label><input type="checkbox" x-model="useNum" /> 0-9</label><label><input type="checkbox" x-model="useSym" /> Symbols</label></div><button type="button" class="rounded-lg bg-foreground px-4 py-2 text-sm text-background" @click="gen()" x-text="labels.generate"></button><div class="flex items-center gap-2" x-show="out"><code class="flex-1 break-all rounded bg-muted p-3 text-sm" x-text="out"></code><button type="button" class="text-sm underline" @click="copy()" x-text="labels.copy"></button></div></div>
</div>
