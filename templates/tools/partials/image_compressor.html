{% load static %}
{{ labels|json_script:"tool-labels" }}
<div class="mx-auto max-w-4xl space-y-6" x-data="window.toolFactory('image-compressor')">
<div class="rounded-xl border border-border bg-card p-6 shadow-sm space-y-4"><input type="file" accept="image/*" @change="onFile($event)" /><label class="text-sm">Quality <input type="range" min="0.1" max="1" step="0.05" x-model.number="quality" /></label><p class="text-sm text-destructive" x-show="err" x-text="err"></p><img x-show="preview" :src="preview" class="max-h-64 rounded border" alt="preview" /><p class="text-sm text-muted-foreground" x-show="busy">Processing…</p></div>
</div>
