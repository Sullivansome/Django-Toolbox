{% load static %}
{{ labels|json_script:"tool-labels" }}
<div class="mx-auto max-w-4xl space-y-6" x-data="window.toolFactory('json-formatter')">
<div class="rounded-xl border border-border bg-card p-6 shadow-sm space-y-4"><textarea class="min-h-[160px] w-full rounded-lg border border-border bg-background p-3 font-mono text-sm" x-model="input"></textarea><button type="button" class="rounded-lg bg-foreground px-4 py-2 text-sm text-background" @click="format()">Format</button><p class="text-sm text-destructive" x-show="err" x-text="err"></p><textarea class="min-h-[200px] w-full rounded-lg border border-border bg-muted/30 p-3 font-mono text-sm" x-model="output" readonly></textarea><button type="button" class="text-sm underline" @click="copy()">Copy</button></div>
</div>
