{% load static %}
{{ labels|json_script:"tool-labels" }}
<div class="mx-auto max-w-4xl space-y-6" x-data="window.toolFactory('uuid-generator')">
<div class="rounded-xl border border-border bg-card p-6 shadow-sm space-y-4"><div class="flex flex-col gap-4 md:flex-row md:items-end"><div class="flex-1 space-y-2"><label class="text-sm font-medium" x-text="labels.count"></label><input type="number" min="1" max="50" class="w-full rounded-lg border border-border bg-background px-4 py-2.5 text-lg shadow-sm" x-model.number="count" /><p class="text-xs text-muted-foreground" x-text="labels.countHelper"></p></div><button type="button" class="rounded-lg bg-foreground px-4 py-2 text-sm font-medium text-background" @click="gen()" x-text="labels.generate"></button></div><p class="text-sm text-destructive" x-show="err" x-text="err"></p><div class="rounded-lg border border-border bg-muted/30 p-4 font-mono text-sm" x-show="values.length"><div class="mb-2 flex justify-between text-xs text-muted-foreground"><span x-text="values.length + ' UUIDs'"></span><button type="button" class="underline" @click="copy()" x-text="labels.copy"></button></div><pre class="whitespace-pre-wrap break-all" x-text="out"></pre></div></div>
</div>
