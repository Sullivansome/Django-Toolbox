{% load static %}
{{ labels|json_script:"tool-labels" }}
<div class="mx-auto max-w-4xl space-y-6" x-data="window.toolFactory('bmi-calculator')">
<div class="rounded-xl border border-border bg-card p-6 shadow-sm space-y-4"><div class="grid gap-4 md:grid-cols-2"><label class="text-sm">Height (cm) <input type="number" class="ml-2 w-full rounded border px-2 py-1" x-model.number="h" @input="calc()" /></label><label class="text-sm">Weight (kg) <input type="number" class="ml-2 w-full rounded border px-2 py-1" x-model.number="w" @input="calc()" /></label></div><p class="text-lg font-semibold" x-show="bmi">BMI: <span x-text="bmi"></span></p></div>
</div>
